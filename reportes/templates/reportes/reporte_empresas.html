{% extends 'base.html' %}
{% block contenido %}

<h2 style="text-align:center;">Empresas con más Casos</h2>

<table class="tabla-reporte">
    <tr>
        <th>Empresa</th>
        <th>Total Casos</th>
    </tr>

    {% for item in datos %}
    <tr>
        <td>{{ item.area_apoyo }}</td>
        <td>{{ item.total }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="2">No hay datos.</td>
    </tr>
    {% endfor %}
</table>

<div style="text-align:center;">
    <a href="{% url 'panel_reportes' %}" class="btn-volver">
        Volver
    </a>
</div>

{% endblock %}
