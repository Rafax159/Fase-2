{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>

{% if messages %}
    {% for message in messages %}
        <div class="error-message">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="login-container">
    <div class="login-box">
        <h2>Iniciar Sesión</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn-login">
                Ingresar
            </button>
        </form>
    </div>
</div>

</body>
</html>
