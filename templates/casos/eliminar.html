{% extends 'base.html' %}

{% block content %}

<h2>Eliminar Caso</h2>

<p>¿Está seguro que desea eliminar el caso {{ caso.id_caso }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-danger">
        Confirmar Eliminación
    </button>
    <a href="{% url 'listar_casos' %}">
        Cancelar
    </a>
</form>

{% endblock %}
