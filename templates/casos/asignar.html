{% extends 'base.html' %}

{% block contenido %}
<h2>Asignar Investigador</h2>

<p><strong>Caso:</strong> {{ caso.titulo }}</p>

<form method="post">
    {% csrf_token %}
    <select name="investigador">
        {% for inv in investigadores %}
            <option value="{{ inv.id }}">{{ inv.username }}</option>
        {% endfor %}
    </select>

    <button type="submit">Asignar</button>
</form>

{% endblock %}
